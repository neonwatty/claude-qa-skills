name: Version Bump

on:
  release:
    types: [published]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', '.claude-plugin/plugin.json']) {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = process.argv[1];
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            }
          " "$VERSION"

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/version-bump-$VERSION
          git add package.json .claude-plugin/plugin.json
          git commit -m "chore(release): bump version to $VERSION"
          git push origin chore/version-bump-$VERSION
          gh pr create \
            --title "chore(release): bump version to $VERSION" \
            --body "Auto-generated version bump from release v$VERSION."
